name: Website build (docs drift check)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install and build
        run: |
          cd website
          npm ci
          npm run build

      - name: Verify committed docs/ matches build output
        run: git diff --exit-code docs
